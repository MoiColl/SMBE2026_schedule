const SESSION={"A": "Monday 29 Jun, 18:00\u201320:00", "B": "Tuesday 30 Jun, 18:00\u201320:00"};

const KEY='smbe2026_posters';
let picks=new Set(JSON.parse(localStorage.getItem(KEY)||'[]'));
let seg={day:'all',grp:'theme'};
const byId=Object.fromEntries(POSTERS.map(p=>[p.id,p]));
function save(){try{localStorage.setItem(KEY,JSON.stringify([...picks]));}catch(e){}}
function esc(s){return (s||'').replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c]));}
function cnt(){document.getElementById('cnt').textContent=picks.size;}
// populate dropdowns
function fill(){
  const th={},ar={};
  POSTERS.forEach(p=>{th[p.theme]=(th[p.theme]||0)+1;ar[p.area]=(ar[p.area]||0)+1;});
  const ts=Object.keys(th).sort((a,b)=>a.localeCompare(b));
  const as=Object.keys(ar).sort((a,b)=>a.localeCompare(b));
  document.getElementById('f-theme').innerHTML='<option value="">All themes</option>'+ts.map(t=>`<option value="${esc(t)}">${esc(t)} (${th[t]})</option>`).join('');
  document.getElementById('f-area').innerHTML='<option value="">All locations</option>'+as.map(t=>`<option value="${esc(t)}">${esc(t)} (${ar[t]})</option>`).join('');
}
function setSeg(g,btn){seg[g]=btn.dataset.v;[...btn.parentNode.children].forEach(b=>b.classList.toggle('on',b===btn));render();}
function toggle(id){if(picks.has(id))picks.delete(id);else picks.add(id);save();cnt();
  document.querySelectorAll('[data-id="'+id+'"]').forEach(e=>e.classList.toggle('sel',picks.has(id)));
  if(document.getElementById('mine').style.display==='block')renderMine();}
function card(p){
  return `<div class="card${picks.has(p.id)?' sel':''}" data-id="${p.id}" onclick="toggle('${p.id}')">
    <div class="bd"><span class="num">${p.bn}</span><span class="grp ${p.group}">${p.group}</span></div>
    <div class="body"><div class="ti">${esc(p.title)}</div>
    <div class="au">${esc(p.name)}${p.org?' · '+esc(p.org):''}${p.country?' · '+esc(p.country):''}</div>
    <div class="meta"><span class="tag">${esc(p.theme)}</span><span class="tag loc">${esc(p.area)} · board ${p.bn}</span></div></div>
    <div class="chk">✓</div></div>`;
}
function render(){
  const q=document.getElementById('q').value.trim().toLowerCase();
  const ft=document.getElementById('f-theme').value, fa=document.getElementById('f-area').value;
  let list=POSTERS.filter(p=>{
    if(seg.day!=='all' && p.group!==seg.day) return false;
    if(ft && p.theme!==ft) return false;
    if(fa && p.area!==fa) return false;
    if(q){const hay=(p.title+' '+p.name+' '+p.org+' '+p.theme+' '+p.country+' '+p.bn).toLowerCase();
      if(!q.split(/\s+/).every(w=>hay.includes(w))) return false;}
    return true;
  });
  document.getElementById('hint').textContent=list.length+' poster'+(list.length!==1?'s':'')+' shown'+(picks.size?' · '+picks.size+' selected':'');
  const box=document.getElementById('results');
  if(!list.length){box.innerHTML='<div class="emptymsg">No posters match your search.</div>';return;}
  let html='';
  if(seg.grp==='none'){
    list.sort((a,b)=>a.group.localeCompare(b.group)||a.bn-b.bn);
    html=list.map(card).join('');
  }else{
    const key=seg.grp;
    const groups={};
    list.forEach(p=>{(groups[p[key]]=groups[p[key]]||[]).push(p);});
    Object.keys(groups).sort((a,b)=>a.localeCompare(b)).forEach(g=>{
      const arr=groups[g].sort((a,b)=>a.group.localeCompare(b.group)||a.bn-b.bn);
      html+=`<div class="gsec"><h2>${esc(g)} <span class="gc">(${arr.length})</span></h2>${arr.map(card).join('')}</div>`;
    });
  }
  box.innerHTML=html;
}
function renderMine(){
  const box=document.getElementById('mine');
  const items=[...picks].map(id=>byId[id]).filter(Boolean);
  if(!items.length){box.innerHTML='<div class="emptymsg">No posters selected yet.<br>Go to <b>Browse</b> and tap the posters you want to visit.</div>';return;}
  items.sort((a,b)=>a.group.localeCompare(b.group)||a.bn-b.bn);
  let html='<div class="hint" style="margin:0 0 6px">'+items.length+' posters selected. Listed in board-number order for each session — handy for walking the floor.</div>';
  let cur=null;
  items.forEach(p=>{
    if(p.group!==cur){if(cur!==null)html+='</div>';cur=p.group;
      html+=`<div class="dsec"><h2>${esc(p.day)} — Group ${p.group} <span class="gc" style="font-weight:400;color:#999;font-size:12px">(${esc(SESSION[p.group])})</span></h2>`;}
    html+=`<div class="card sel" data-id="${p.id}">
      <div class="bd"><span class="num">${p.bn}</span><span class="grp ${p.group}">${p.group}</span></div>
      <div class="body"><div class="ti">${esc(p.title)}</div>
      <div class="au">${esc(p.name)}${p.org?' · '+esc(p.org):''}</div>
      <div class="meta"><span class="tag loc">${esc(p.area)} · board ${p.bn}</span><span class="tag">${esc(p.theme)}</span></div></div>
      <button class="rm" title="Remove" onclick="event.stopPropagation();toggle('${p.id}')">×</button></div>`;
  });
  html+='</div>';
  box.innerHTML=html;
}
function clearAll(){if(!picks.size)return;if(confirm('Remove all '+picks.size+' selected posters?')){picks.clear();save();cnt();render();renderMine();}}
function showView(v){
  document.getElementById('browse').style.display=v==='browse'?'block':'none';
  document.getElementById('mine').style.display=v==='mine'?'block':'none';
  document.getElementById('tab-browse').classList.toggle('active',v==='browse');
  document.getElementById('tab-mine').classList.toggle('active',v==='mine');
  if(v==='mine')renderMine();
  window.scrollTo(0,0);
}
fill();cnt();render();

</script></body></html>
